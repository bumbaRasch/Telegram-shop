[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (undefined names, unused imports, etc.)
    "B",    # flake8-bugbear (common bugs and anti-patterns)
    "UP",   # pyupgrade (modern Python 3.11+ syntax)
    "I",    # isort (import ordering)
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long — formatter handles this
    "B008",   # function calls in default arguments — needed for aiogram F.data filter patterns
    "B904",   # raise from err — too noisy in handler exception chains
    "RUF006", # asyncio dangling task — intentional fire-and-forget for cache invalidation
]

[tool.ruff.lint.per-file-ignores]
# Wildcard re-exports are intentional in __init__ files
"__init__.py"                          = ["F401", "F403"]
"bot/database/methods/__init__.py"     = ["F401", "F403", "F405"]
# Russian i18n strings — Cyrillic chars that look like Latin are expected
"bot/i18n/strings.py"                  = ["RUF001"]
# sqladmin class-level mutable attributes are framework-required
"bot/web/admin.py"                     = ["RUF012"]
# Alembic migration files
"migrations/**"                        = ["E402", "F401"]
# Tests — unused imports and some bugbear rules are common/intentional
"tests/**"                             = ["F401", "B"]

[tool.ruff.format]
quote-style  = "double"
indent-style = "space"
line-ending  = "auto"
